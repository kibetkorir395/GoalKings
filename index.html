  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js', { scope: '/' })
          .then(registration => {
            console.log('SW registered:', registration.scope);

            // Check for updates
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New content available, notify user
                    if (confirm('New version available! Reload to update?')) {
                      newWorker.postMessage({ type: 'SKIP_WAITING' });
                      window.location.reload();
                    }
                  }
                });
              }
            });
          })
          .catch(error => console.error('SW registration failed:', error));
      });
    }

    // Dynamically update theme color based on color scheme
    const themeColorMeta = document.querySelector('meta[name="theme-color"]');
    const mediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

    const updateThemeColor = (isDark) => {
      themeColorMeta?.setAttribute('content', isDark ? '#0A6847' : '#059212');
    };

    updateThemeColor(mediaQuery.matches);
    mediaQuery.addEventListener('change', (e) => updateThemeColor(e.matches));
  </script>
